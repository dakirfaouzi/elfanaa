<?xml version="1.0" encoding="UTF-8"?>
<!--
  FANAA - Full Logo Lockup (mark + wordmark + tagline) — Health & Beauty
  ------------------------------------------------------
  Drop-in SVG for emails, embeds, and OG cards where web fonts won't
  always load. Falls back through Amiri -> Scheherazade -> Noto Naskh
  Arabic -> serif so the wordmark keeps its calligraphic feel even on
  bare devices. Arabic letterforms are NCR-encoded so the file stays
  pure ASCII and survives any toolchain re-encoding.

  Tagline (NCR): أصلك يطلع من جوّاك
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Fanaa">
  <!-- Mark: minimal serum dewdrop in a soft circle (rose copper) -->
  <g fill="none" stroke="#BA6E5C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(144 12)">
    <circle cx="16" cy="16" r="12.5"/>
    <path d="M16 7.5C13.5 11 11.8 13.6 11.8 16.4C11.8 18.7 13.7 20.6 16 20.6C18.3 20.6 20.2 18.7 20.2 16.4C20.2 13.6 18.5 11 16 7.5Z"/>
  </g>
  <!-- Wordmark: فناء (charcoal, calligraphic) -->
  <text x="160" y="135" text-anchor="middle" fill="#161212" font-family="'Amiri', 'Scheherazade New', 'Noto Naskh Arabic', serif" font-size="64" font-weight="700" direction="rtl">&#x0641;&#x0646;&#x0627;&#x0621;</text>
  <!-- Flourish: minimal hairline divider with rose-copper centre dot -->
  <g stroke="#BA6E5C" stroke-width="0.8" stroke-linecap="round" transform="translate(160 158)">
    <line x1="-44" y1="0" x2="-6" y2="0"/>
    <line x1="6" y1="0" x2="44" y2="0"/>
    <circle cx="0" cy="0" r="1.4" fill="#BA6E5C" stroke="none"/>
  </g>
  <!-- Tagline: "أصلك يطلع من جوّاك" -->
  <text x="160" y="190" text-anchor="middle" fill="#BA6E5C" font-family="'Amiri', 'Noto Naskh Arabic', serif" font-size="16" direction="rtl">&#x0623;&#x0635;&#x0644;&#x0643; &#x064A;&#x0637;&#x0644;&#x0639; &#x0645;&#x0646; &#x062C;&#x0648;&#x0651;&#x0627;&#x0643;</text>
</svg>
