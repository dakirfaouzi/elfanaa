# ─────────────────────────────────────────────────────────────────────────────
# ELFANAA — local stack
# ─────────────────────────────────────────────────────────────────────────────
# Three services, one network:
#   • elfanaa_database  — Postgres 16 with a named volume for durable data
#   • elfanaa_api       — FastAPI (./backend), reads/writes Postgres
#   • elfanaa_web       — Next.js storefront, talks to the API via the
#                         private docker network or directly via NEXT_PUBLIC_API_BASE_URL
#
# Run the stack:
#   docker compose up --build
#
# Run only the database (when developing the apps locally):
#   docker compose up elfanaa_database -d
#
# EasyPanel deploys these as three separate services. Use this file as the
# ground-truth env contract for the EasyPanel "compose" or "Source: Dockerfile"
# templates.
# ─────────────────────────────────────────────────────────────────────────────

services:
  elfanaa_database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elfanaa}
      POSTGRES_USER: ${POSTGRES_USER:-elfanaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elfanaa}
    volumes:
      - elfanaa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elfanaa -d elfanaa"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      # Expose locally for tooling (DBeaver / TablePlus). EasyPanel does
      # not expose this port publicly — it stays on the private network.
      - "5432:5432"

  elfanaa_api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      elfanaa_database:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://elfanaa:elfanaa@elfanaa_database:5432/elfanaa}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,https://elfanaa.com}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ORDERS_WEBHOOK_URL: ${ORDERS_WEBHOOK_URL:-}
      SHIPPING_WEBHOOK_URL: ${SHIPPING_WEBHOOK_URL:-}
      GOOGLE_SHEETS_WEBHOOK_URL: ${GOOGLE_SHEETS_WEBHOOK_URL:-}
      GOOGLE_SHEETS_API_KEY: ${GOOGLE_SHEETS_API_KEY:-}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_CAPI_ACCESS_TOKEN: ${META_CAPI_ACCESS_TOKEN:-}
      TIKTOK_PIXEL_ID: ${TIKTOK_PIXEL_ID:-}
      TIKTOK_EVENTS_ACCESS_TOKEN: ${TIKTOK_EVENTS_ACCESS_TOKEN:-}
      SNAPCHAT_PIXEL_ID: ${SNAPCHAT_PIXEL_ID:-}
      SNAPCHAT_CAPI_ACCESS_TOKEN: ${SNAPCHAT_CAPI_ACCESS_TOKEN:-}
      # MaxMind IP fraud / geo-block — see backend/.env.example for setup.
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      ENABLE_IP_FRAUD_CHECK: ${ENABLE_IP_FRAUD_CHECK:-false}
      ALLOWED_COUNTRIES: ${ALLOWED_COUNTRIES:-SA}
      WHITELISTED_PHONES: ${WHITELISTED_PHONES:-}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD", "python", "-c",
         "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  elfanaa_web:
    build:
      context: .
      dockerfile: apps/fanaa/Dockerfile
      # CRITICAL — NEXT_PUBLIC_* are inlined by Webpack at build time, so
      # they MUST be passed as build args, not just runtime environment
      # variables. EasyPanel users: set these in the service's "Build
      # Arguments" tab, not "Environment Variables". Forgetting this is
      # the canonical cause of "orders go to /api/orders instead of the
      # FastAPI backend, sheet stays empty" bugs.
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://elfanaa.com}
        NEXT_PUBLIC_DEFAULT_LOCALE: ar
        NEXT_PUBLIC_CURRENCY: SAR
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
        NEXT_PUBLIC_TIKTOK_PIXEL_ID: ${NEXT_PUBLIC_TIKTOK_PIXEL_ID:-}
        NEXT_PUBLIC_SNAPCHAT_PIXEL_ID: ${NEXT_PUBLIC_SNAPCHAT_PIXEL_ID:-}
    restart: unless-stopped
    depends_on:
      elfanaa_api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Runtime mirror — used by Next.js server-side code (route handlers,
      # RSC). NEXT_PUBLIC_* values must ALSO be set here for SSR consistency;
      # the build args above only cover the browser-side bundle.
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://elfanaa.com}
      NEXT_PUBLIC_DEFAULT_LOCALE: ar
      NEXT_PUBLIC_CURRENCY: SAR
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
      NEXT_PUBLIC_TIKTOK_PIXEL_ID: ${NEXT_PUBLIC_TIKTOK_PIXEL_ID:-}
      NEXT_PUBLIC_SNAPCHAT_PIXEL_ID: ${NEXT_PUBLIC_SNAPCHAT_PIXEL_ID:-}
      # ── Studio reverse-proxy mount (M12) ──────────────────────────
      # When set, the storefront's Next.js `rewrites()` proxies every
      # `/studio` + `/studio/*` request to the Studio service over the
      # private docker network. Leave UNSET to disable the proxy and
      # rely on an external Traefik/EasyPanel domain rule instead.
      STUDIO_INTERNAL_URL: ${STUDIO_INTERNAL_URL:-http://elfanaa_studio:3000}
      # ── Admin dashboard ───────────────────────────────────────────
      # Reuses the same Postgres instance as the FastAPI service. Tables
      # are auto-created by FastAPI's lifespan migration on startup —
      # no manual `prisma migrate` step required.
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:-postgresql://elfanaa:elfanaa@elfanaa_database:5432/elfanaa}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      JWT_SECRET: ${JWT_SECRET:-}
      ADMIN_ALLOWED_COUNTRIES: ${ADMIN_ALLOWED_COUNTRIES:-SA,AE,KW,QA,BH,OM,YE}
      ADMIN_QUALITY_THRESHOLD: ${ADMIN_QUALITY_THRESHOLD:-60}
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      ORDERS_WEBHOOK_URL: ${ORDERS_WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    ports:
      - "3000:3000"

  # ── Studio (M2) ───────────────────────────────────────────────────────────
  # Internal AI ecommerce production app. Deliberately stateless in M2:
  # no DB, no FastAPI dependency, no shared cookie with elfanaa_web.
  #
  # Auth is decoupled from Fanaa admin — separate STUDIO_EMAIL,
  # STUDIO_PASSWORD_HASH, STUDIO_JWT_SECRET (see apps/studio/.env.example).
  # The container starts even when those are unset; the /login endpoint
  # will respond 503 with an actionable error until they are configured.
  #
  # Host port 3001 to avoid clashing with elfanaa_web on 3000. EasyPanel
  # deploys this as a separate service behind its own subdomain.
  elfanaa_studio:
    build:
      context: .
      dockerfile: apps/studio/Dockerfile
      # CRITICAL — NEXT_PUBLIC_STUDIO_BASE_PATH is baked into the bundle
      # at build time (basePath / assetPrefix), so it MUST be passed as
      # a build arg, NOT just a runtime env var. EasyPanel users: set
      # this in the service's "Build Arguments" tab.
      args:
        NEXT_PUBLIC_STUDIO_BASE_PATH: ${NEXT_PUBLIC_STUDIO_BASE_PATH:-/studio}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Mirror the build arg as a runtime env so `next start` reads the
      # same value through `next.config.mjs` on container boot.
      NEXT_PUBLIC_STUDIO_BASE_PATH: ${NEXT_PUBLIC_STUDIO_BASE_PATH:-/studio}
      STUDIO_EMAIL: ${STUDIO_EMAIL:-}
      STUDIO_PASSWORD: ${STUDIO_PASSWORD:-}
      STUDIO_PASSWORD_HASH: ${STUDIO_PASSWORD_HASH:-}
      STUDIO_JWT_SECRET: ${STUDIO_JWT_SECRET:-}
      STUDIO_AUTH_COOKIE: ${STUDIO_AUTH_COOKIE:-}
      # Studio persistence + R2 (passed through from the host env so the
      # same .env drives both the standalone deployment and the proxied
      # `elfanaa.com/studio` deployment).
      STUDIO_PERSISTENCE_MODE: ${STUDIO_PERSISTENCE_MODE:-}
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    ports:
      - "3001:3000"

volumes:
  elfanaa_pgdata:
    driver: local
