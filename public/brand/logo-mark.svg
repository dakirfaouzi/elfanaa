<?xml version="1.0" encoding="UTF-8"?>
<!--
  FANAA — Brand Mark (Health & Beauty)
  ----------------------------------
  Minimal serum dewdrop inside a soft circle. The droplet shape is the
  universal skincare/beauty archetype; the enclosing circle reads as
  containment / formulation / care. Single mark, single feeling.

  Strokes use `currentColor` so callers can paint it via CSS; the default
  render colour is rose copper (#BA6E5C). The viewBox is 32x32 so the
  same paths drop into the favicon, the touch icon, and any in-app
  surface without re-authoring.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" color="#BA6E5C" role="img" aria-label="Fanaa mark">
  <circle cx="16" cy="16" r="12.5"/>
  <path d="M16 7.5C13.5 11 11.8 13.6 11.8 16.4C11.8 18.7 13.7 20.6 16 20.6C18.3 20.6 20.2 18.7 20.2 16.4C20.2 13.6 18.5 11 16 7.5Z"/>
</svg>
