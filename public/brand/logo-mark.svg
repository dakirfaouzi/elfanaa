<!--
  ELFANAA - Brand Mark (icon-only)
  ----------------------------------
  Najdi pointed arch with a courtyard plant. Single mark, single feeling.
  Strokes use `currentColor` so callers can paint it via CSS; the default
  render colour is antique brass (#B4894A). The viewBox is 32x32 so the
  same paths can be dropped into the favicon, the touch icon, and any
  in-app surface without re-authoring.
-->
