<?xml version="1.0" encoding="UTF-8"?>
<!--
  ELFANAA - Full Logo Lockup (mark + wordmark + tagline)
  ------------------------------------------------------
  Drop-in SVG for emails, embeds, and OG cards where web fonts won't
  always load. Falls back through Amiri -> Scheherazade -> Noto Naskh
  Arabic -> serif so the wordmark keeps its calligraphic feel even on
  bare devices. Arabic letterforms are NCR-encoded so the file stays
  pure ASCII and survives any toolchain re-encoding.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Elfanaa">
  <g fill="none" stroke="#B4894A" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" transform="translate(144 12)">
    <line x1="7" y1="28" x2="11" y2="28"/>
    <line x1="21" y1="28" x2="25" y2="28"/>
